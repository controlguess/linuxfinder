<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="title" content="DistroBin">
<meta name="description" content="Get linux distros without the hassle.">
<title>DistroBin</title>

<meta property="og:type" content="website">
<meta property="og:title" content="DistroBin">
<meta property="og:description" content="Get linux distros without the hassle.">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Tahoma,sans-serif;
    background:#008080;
    overflow-x:hidden;
}

.desktop{
    min-height:100vh;
    padding:15px;
    padding-bottom:60px;
}

.window{
    width:100%;
    max-width:900px;
    margin:20px auto;
    border:3px solid #0a246a;
    background:#ece9d8;
    box-shadow:
        inset -1px -1px #fff,
        inset 1px 1px #808080,
        0 10px 25px rgba(0,0,0,.4);
}

.titlebar{
    background:linear-gradient(to right,#0a246a,#3a6ea5);
    color:#fff;
    padding:8px 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-weight:bold;
}

.title-buttons{
    display:flex;
    gap:4px;
}

.title-btn{
    width:18px;
    height:18px;
    background:#d4d0c8;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    border:1px solid #fff;
    box-shadow:
        inset -1px -1px #808080,
        inset 1px 1px #fff;
}

.window-content{
    padding:20px;
}

.logo{
    text-align:center;
}

.logo h1{
    margin:0;
    color:#0a246a;
    font-size:clamp(36px,8vw,56px);
    text-shadow:2px 2px #fff;
}

.logo p{
    margin:8px 0 20px;
    color:#333;
    font-size:18px;
}

.button-group{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.xp-btn{
    display:inline-block;
    padding:10px 18px;
    background:#d4d0c8;
    border:2px solid #fff;
    box-shadow:
        inset -1px -1px #808080,
        inset 1px 1px #fff;
    color:#000;
    text-decoration:none;
    font-weight:bold;
    cursor:pointer;
    transition:.1s;
}

.xp-btn:hover{
    background:#e8e5dc;
}

.xp-btn:active{
    box-shadow:
        inset 1px 1px #808080,
        inset -1px -1px #fff;
}

.section{
    margin-top:25px;
    padding:15px;
    background:#fff;
    border:2px solid #808080;
    box-shadow:
        inset 1px 1px #fff,
        inset -1px -1px #c0c0c0;
}

.section h2{
    margin-top:0;
    color:#0a246a;
    font-size:22px;
}

.codebox{
    background:#000;
    color:#00ff00;
    padding:14px;
    margin-top:10px;
    font-family:Consolas,monospace;
    border:2px inset #808080;
    overflow-x:auto;
    white-space:pre-wrap;
    word-break:break-word;
}

ul,ol{
    padding-left:20px;
}

.taskbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:42px;
    background:linear-gradient(to top,#245edb,#3a6ea5);
    display:flex;
    align-items:center;
    padding:0 8px;
    z-index:999;
}

.start-btn{
    background:linear-gradient(to bottom,#3cb043,#2d8b35);
    color:#fff;
    padding:6px 14px;
    border-radius:4px;
    font-weight:bold;
    border:2px solid rgba(255,255,255,.4);
}

.clock{
    margin-left:auto;
    color:#fff;
    font-weight:bold;
    font-size:14px;
}

.icons{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

.icon{
    width:70px;
    text-align:center;
    color:#fff;
    font-size:13px;
}

.icon img{
    width:48px;
    display:block;
    margin:auto auto 5px;
}

@media(max-width:600px){

    .window-content{
        padding:14px;
    }

    .section h2{
        font-size:19px;
    }

    .logo p{
        font-size:15px;
    }

    .xp-btn{
        width:100%;
        text-align:center;
    }

    .button-group{
        flex-direction:column;
    }

    .icons{
        justify-content:center;
    }
}
</style>
</head>
<body>

<div class="desktop">

    <div class="icons">
        <div class="icon">
            <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png">
            My Computer
        </div>

        <div class="icon">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991112.png">
            DistroBin
        </div>
    </div>

    <div class="window">

        <div class="titlebar">
            <div>DistroBin Installer</div>

            <div class="title-buttons">
                <div class="title-btn">_</div>
                <div class="title-btn">□</div>
                <div class="title-btn">X</div>
            </div>
        </div>

        <div class="window-content">

            <div class="logo">
                <h1>DistroBin</h1>
                <p>by 8k</p>

                <div class="button-group">
                </div>
            </div>

            <div class="section">
                <h2>Install DistroBin</h2>

                <p>Open your terminal and run the following</p>

                <div class="codebox" id="installCmd">curl -fsSL "https://db.getmemore.beer/a/main.sh" -o /tmp/distrob.sh && bash /tmp/distrob.sh</div>

                <br>

                <button class="xp-btn" onclick="copyCmd()">
                    Copy Command
                </button>
            </div>

        </div>
    </div>
</div>

<div class="taskbar">
    <div class="start-btn">Start</div>

    <div class="clock" id="clock">
        12:00 PM
    </div>
</div>

<script>
function copyCmd(){
    const text=document.getElementById("installCmd").innerText;

    navigator.clipboard.writeText(text);

    alert("Install command copied!");
}

function updateClock(){
    const now=new Date();

    let hours=now.getHours();
    let minutes=now.getMinutes();

    const ampm=hours>=12?"PM":"AM";

    hours=hours%12;
    hours=hours?hours:12;

    minutes=minutes<10?"0"+minutes:minutes;

    document.getElementById("clock").innerText=
        `${hours}:${minutes} ${ampm}`;
}

setInterval(updateClock,1000);

updateClock();
</script>

</body>
</html>
